name: Lighthouse

on:
  deployment_status:

permissions:
  actions: read
  contents: write

concurrency:
  group: lighthouse-production
  cancel-in-progress: true

jobs:
  audit:
    name: refresh Lighthouse scores
    if: github.event.deployment_status.state == 'success' && github.event.deployment.environment == 'Production'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Check deployment commit
        id: deployment
        env:
          DEPLOYMENT_SHA: ${{ github.event.deployment.sha }}
        run: |
          subject="$(git log -1 --format=%s "$DEPLOYMENT_SHA")"
          author="$(git log -1 --format=%an "$DEPLOYMENT_SHA")"
          changed_files="$(git diff-tree --no-commit-id --name-only -r "$DEPLOYMENT_SHA" | sort | tr '\n' ' ')"

          echo "sha=$DEPLOYMENT_SHA"
          echo "subject=$subject"
          echo "author=$author"
          echo "changed_files=$changed_files"

          if [ "$subject" = "Update Lighthouse scores [skip ci]" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping generated Lighthouse score commit."
            exit 0
          fi

          if [ "$author" = "github-actions[bot]" ] && [ "$changed_files" = "src/features/colophon/data/lighthouse.json " ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping generated Lighthouse score commit."
            exit 0
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Wait for CI to pass
        if: steps.deployment.outputs.skip != 'true'
        env:
          DEPLOYMENT_SHA: ${{ github.event.deployment.sha }}
          GH_TOKEN: ${{ github.token }}
        run: |
          for attempt in $(seq 1 30); do
            ci_result="$(gh run list \
              --repo "$GITHUB_REPOSITORY" \
              --workflow ci.yml \
              --commit "$DEPLOYMENT_SHA" \
              --json status,conclusion \
              --jq '.[0] | [.status, .conclusion] | @tsv')"

            status="$(printf '%s' "$ci_result" | cut -f1)"
            conclusion="$(printf '%s' "$ci_result" | cut -f2)"

            echo "CI check attempt $attempt: status=${status:-missing} conclusion=${conclusion:-missing}"

            if [ "$status" = "completed" ] && [ "$conclusion" = "success" ]; then
              exit 0
            fi

            if [ "$status" = "completed" ] && [ "$conclusion" != "success" ]; then
              echo "CI completed with conclusion: $conclusion"
              exit 1
            fi

            sleep 20
          done

          echo "Timed out waiting for CI to pass for $DEPLOYMENT_SHA"
          exit 1

      - uses: pnpm/action-setup@v6.0.3
        if: steps.deployment.outputs.skip != 'true'

      - uses: actions/setup-node@v6
        if: steps.deployment.outputs.skip != 'true'
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        if: steps.deployment.outputs.skip != 'true'
        run: pnpm install --frozen-lockfile

      - name: Run Lighthouse
        if: steps.deployment.outputs.skip != 'true'
        env:
          LIGHTHOUSE_URL: https://www.kerkstra.dev
        run: pnpm audit:lighthouse

      - name: Commit updated Lighthouse scores
        if: steps.deployment.outputs.skip != 'true'
        run: |
          if git diff --quiet -- src/features/colophon/data/lighthouse.json; then
            echo "Lighthouse scores unchanged."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/features/colophon/data/lighthouse.json
          git commit -m "Update Lighthouse scores [skip ci]"
          git push
