version: 2
updates:
  # npm/pnpm dependencies
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: America/Chicago
    open-pull-requests-limit: 5
    labels:
      - dependencies
    groups:
      # Group all minor + patch updates into a single PR per week.
      # Major bumps still get their own PR for explicit review.
      minor-and-patch:
        update-types:
          - minor
          - patch
    ignore:
      # Pin oxlint/oxfmt to manual updates — they release fast and
      # rule-set churn breaks builds.
      - dependency-name: oxlint
        update-types: [version-update:semver-major]
      - dependency-name: oxfmt
        update-types: [version-update:semver-major]

  # GitHub Actions versions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    labels:
      - dependencies
      - github-actions
