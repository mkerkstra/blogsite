version: 2
updates:
  # npm/pnpm dependencies
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: America/Chicago
    open-pull-requests-limit: 5
    labels:
      - dependencies
    cooldown:
      default-days: 8
    groups:
      # Group all minor + patch updates into a single PR per week.
      # Major bumps still get their own PR for explicit review.
      minor-and-patch:
        update-types:
          - minor
          - patch
    ignore:
      # Keep oxlint/oxfmt major bumps manual — they release fast and
      # major rule-set churn can break builds.
      - dependency-name: oxlint
        update-types: ["version-update:semver-major"]
      - dependency-name: oxfmt
        update-types: ["version-update:semver-major"]

  # GitHub Actions versions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    labels:
      - dependencies
      - github-actions
    cooldown:
      default-days: 8
