# Pre-commit hooks. Install with `pnpm exec lefthook install` (one-time
# per clone). Runs lint+typecheck on staged files before each commit.
#
# Replaces the husky+lint-staged setup that was removed during the
# Next 16 modernization. Lefthook is faster, no Node-startup-on-every-
# git-action overhead, and config lives in a single yml file.

pre-commit:
  parallel: true
  commands:
    lint:
      glob: "src/**/*.{ts,tsx,js,jsx,json}"
      run: pnpm lint
      stage_fixed: true
    typecheck:
      glob: "src/**/*.{ts,tsx}"
      run: pnpm typecheck
    test:
      glob: "src/**/*.{ts,tsx}"
      run: pnpm test

pre-push:
  commands:
    build:
      run: pnpm build
